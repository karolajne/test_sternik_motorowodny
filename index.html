<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test – Sternik Motorowodny</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0b1926;
  --surface:  #0e2236;
  --surface2: #122843;
  --border:   #1c3d5e;
  --accent:   #2196f3;
  --accent2:  #0d6efd;
  --text:     #dce8f5;
  --muted:    #6b8aaa;
  --green:    #43a047;
  --green-bg: #071f0a;
  --red:      #e53935;
  --red-bg:   #200808;
  --yellow:   #ffa000;
}

body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── SPLASH ── */
#splash { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1rem; }

.splash-header { text-align: center; margin-bottom: 2.5rem; }
.splash-icon { font-size: 3.5rem; margin-bottom: .75rem; display: block; }
.splash-header h1 { font-size: 2rem; color: #fff; font-weight: 700; letter-spacing: -.5px; }
.splash-header p  { color: var(--muted); margin-top: .35rem; font-size: 1rem; }

.config-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 2rem; width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 1.75rem;
}

.config-section-title {
  font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--accent); margin-bottom: .85rem;
}

/* Sections checkboxes */
.sections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
.section-check { display: flex; align-items: flex-start; gap: .65rem; cursor: pointer; }
.section-check input[type=checkbox] { display: none; }
.checkmark {
  width: 20px; height: 20px; min-width: 20px; border: 2px solid var(--border); border-radius: 5px;
  background: var(--surface2); display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all .15s;
}
.section-check input:checked + .checkmark { background: var(--accent); border-color: var(--accent); }
.section-check input:checked + .checkmark::after { content: '✓'; color: #fff; font-size: .8rem; font-weight: 700; }
.section-label { font-size: .88rem; line-height: 1.35; color: var(--text); }
.section-label .sec-count { color: var(--muted); font-size: .78rem; }

.select-all-row { display: flex; gap: .75rem; margin-bottom: .85rem; }
.link-btn { background: none; border: none; color: var(--accent); font-size: .83rem; cursor: pointer; text-decoration: underline; padding: 0; }
.link-btn:hover { color: #63b3ff; }

/* Count control */
.count-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
.count-control {
  display: flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}
.count-btn {
  background: var(--surface2); border: none; color: var(--text); width: 38px; height: 38px;
  font-size: 1.2rem; cursor: pointer; transition: background .15s; display: flex; align-items: center; justify-content: center;
}
.count-btn:hover { background: var(--border); }
.count-btn:active { background: var(--accent); }
.count-val {
  min-width: 52px; text-align: center; font-size: 1.05rem; font-weight: 700;
  color: #fff; border: none; background: var(--surface); padding: 0 .4rem; height: 38px;
  outline: none; -moz-appearance: textfield;
}
.count-val::-webkit-outer-spin-button,
.count-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.count-input-wrap { position: relative; }
.count-max { color: var(--muted); font-size: .85rem; }

.quick-btns { display: flex; gap: .5rem; flex-wrap: wrap; }
.quick-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); font-size: .82rem; padding: .3rem .75rem; cursor: pointer; transition: all .15s;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); }
.quick-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(33,150,243,.1); }

/* Start button */
.start-row { display: flex; flex-direction: column; align-items: center; gap: .75rem; }
.btn-start {
  width: 100%; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff; border: none; border-radius: 12px; padding: .9rem 2rem; font-size: 1.1rem; font-weight: 700;
  cursor: pointer; transition: all .2s; letter-spacing: .02em;
  box-shadow: 0 4px 20px rgba(33,150,243,.35);
}
.btn-start:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(33,150,243,.45); }
.btn-start:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }
.start-hint { color: var(--muted); font-size: .83rem; }

/* ── QUIZ ── */
#quiz { display: none; min-height: 100vh; }

.qhdr {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: .85rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 10;
}
.qhdr-title { font-weight: 700; color: var(--accent); font-size: 1rem; white-space: nowrap; }
.qhdr-bar  { flex: 1; min-width: 80px; height: 6px; background: var(--border); border-radius: 99px; }
.qhdr-fill { height: 6px; border-radius: 99px; background: var(--accent); transition: width .4s ease; }
.qhdr-info { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
.qhdr-prog { color: var(--muted); font-size: .82rem; white-space: nowrap; }
.qhdr-score { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .25rem .65rem; font-size: .82rem; white-space: nowrap; }
.qhdr-score .sv { color: #fff; font-weight: 700; }
.ok-c { color: var(--green); }
.err-c { color: var(--red); }

.qbody { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }

.qnum { color: var(--muted); font-size: .8rem; margin-bottom: .5rem; }
.qtext { font-size: 1.12rem; line-height: 1.6; margin-bottom: 1.5rem; }

.answers { display: flex; flex-direction: column; gap: .65rem; margin-bottom: 1.2rem; }

.ans-btn {
  background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
  padding: .85rem 1.1rem; text-align: left; cursor: pointer; font-size: .97rem;
  color: var(--text); transition: border-color .15s, background .15s;
  display: flex; align-items: flex-start; gap: .7rem;
}
.ans-label {
  background: var(--surface2); color: var(--accent); border-radius: 6px;
  min-width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .8rem; flex-shrink: 0; margin-top: 1px;
}
.ans-btn:not(.locked):hover { border-color: var(--accent); background: var(--surface2); }
.ans-btn.correct { border-color: var(--green); background: var(--green-bg); color: #a5d6a7; }
.ans-btn.correct .ans-label { background: #1a4a1c; color: #81c784; }
.ans-btn.wrong   { border-color: var(--red);   background: var(--red-bg);   color: #ef9a9a; }
.ans-btn.wrong .ans-label   { background: #4a1414; color: #e57373; }
.ans-btn.locked  { cursor: default; }

.feedback { border-radius: 10px; padding: .7rem 1rem; margin-bottom: 1rem; font-size: .92rem; display: none; }
.feedback.show { display: block; }
.feedback.ok  { background: var(--green-bg); border: 1px solid var(--green); color: #a5d6a7; }
.feedback.err { background: var(--red-bg);   border: 1px solid var(--red);   color: #ef9a9a; }

.btn-next {
  background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
  border: none; border-radius: 10px; padding: .7rem 1.8rem; font-size: .97rem;
  font-weight: 600; cursor: pointer; display: none; transition: all .2s;
}
.btn-next.show { display: inline-flex; align-items: center; gap: .4rem; }
.btn-next:hover { transform: translateY(-1px); }

/* ── RESULTS ── */
#results { display: none; min-height: 100vh; padding: 3rem 1.25rem 4rem; }
.res-inner { max-width: 600px; margin: 0 auto; text-align: center; }
.res-inner h2 { font-size: 1.9rem; color: #fff; margin-bottom: .5rem; }
.res-inner .res-sub { color: var(--muted); font-size: .92rem; margin-bottom: 1.5rem; }

.result-ring { width: 150px; height: 150px; margin: 0 auto 1.25rem; position: relative; }
.rsvg { transform: rotate(-90deg); }
.rring-bg   { fill: none; stroke: var(--border); stroke-width: 12; }
.rring-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dasharray 1s ease; }
.rtext { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.rpct { font-size: 2rem; font-weight: 800; color: #fff; }
.rsub { font-size: .75rem; color: var(--muted); }

.grade-pill {
  display: inline-block; border-radius: 99px; padding: .4rem 1.5rem;
  font-size: 1.05rem; font-weight: 700; margin-bottom: 1.5rem;
}
.gA { background: rgba(67,160,71,.12); border: 2px solid var(--green); color: var(--green); }
.gB { background: rgba(33,150,243,.12); border: 2px solid var(--accent); color: #63b3ff; }
.gC { background: rgba(255,160,0,.12); border: 2px solid var(--yellow); color: var(--yellow); }
.gD { background: rgba(229,57,53,.12); border: 2px solid var(--red); color: var(--red); }

.stat-row { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.4rem; }
.stat-box .sv { font-size: 1.7rem; font-weight: 800; color: #fff; }
.stat-box .sl { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
.stat-box.sg .sv { color: var(--green); }
.stat-box.sr .sv { color: var(--red); }

.res-btns { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
.btn-redo { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 10px; padding: .75rem 1.75rem; font-size: .97rem; font-weight: 700; cursor: pointer; transition: all .2s; }
.btn-redo:hover { transform: translateY(-1px); }
.btn-out { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: .7rem 1.5rem; font-size: .92rem; cursor: pointer; transition: all .15s; }
.btn-out:hover { border-color: var(--accent); color: var(--accent); }

/* Review */
.review-wrap { max-width: 720px; margin: 0 auto; text-align: left; }
.review-hdr { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 1rem; }
.rev-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: .6rem; }
.rev-item.rev-wrong { border-color: rgba(229,57,53,.35); }
.rev-q { font-size: .92rem; color: var(--text); margin-bottom: .45rem; line-height: 1.45; }
.rev-ans { font-size: .84rem; }
.rev-ans .ca { color: var(--green); }
.rev-ans .wa { color: var(--red); }

@media (max-width:500px) {
  .sections-grid { grid-template-columns: 1fr; }
  .splash-header h1 { font-size: 1.5rem; }
  .qtext { font-size: 1rem; }
}
</style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <div class="splash-header">
    <span class="splash-icon">⚓</span>
    <h1>Sternik Motorowodny</h1>
    <p>Baza 558 pytań egzaminacyjnych</p>
  </div>

  <div class="config-card">

    <!-- DZIAŁY -->
    <div>
      <div class="config-section-title">Działy tematyczne</div>
      <div class="select-all-row">
        <button class="link-btn" onclick="selectAllSections(true)">Zaznacz wszystkie</button>
        <button class="link-btn" onclick="selectAllSections(false)">Odznacz wszystkie</button>
      </div>
      <div class="sections-grid" id="sections-grid">
        <label class="section-check">
          <input type="checkbox" class="sec-cb" data-start="0" data-end="148" checked>
          <span class="checkmark"></span>
          <span class="section-label">Dział 1 – Przepisy i oznakowanie <span class="sec-count">(149 pyt.)</span></span>
        </label>
        <label class="section-check">
          <input type="checkbox" class="sec-cb" data-start="149" data-end="252" checked>
          <span class="checkmark"></span>
          <span class="section-label">Dział 2 – Budowa i eksploatacja <span class="sec-count">(104 pyt.)</span></span>
        </label>
        <label class="section-check">
          <input type="checkbox" class="sec-cb" data-start="253" data-end="383" checked>
          <span class="checkmark"></span>
          <span class="section-label">Dział 3 – Meteorologia <span class="sec-count">(131 pyt.)</span></span>
        </label>
        <label class="section-check">
          <input type="checkbox" class="sec-cb" data-start="384" data-end="492" checked>
          <span class="checkmark"></span>
          <span class="section-label">Dział 4 – Ratownictwo i bezpieczeństwo <span class="sec-count">(109 pyt.)</span></span>
        </label>
        <label class="section-check" style="grid-column:1/-1">
          <input type="checkbox" class="sec-cb" data-start="493" data-end="557" checked>
          <span class="checkmark"></span>
          <span class="section-label">Dział 5 – Etykieta i ochrona środowiska <span class="sec-count">(65 pyt.)</span></span>
        </label>
      </div>
      <div style="margin-top:.6rem; font-size:.8rem; color:var(--muted)">Dostępnych pytań: <span id="avail-count" style="color:#fff;font-weight:700">558</span></div>
    </div>

    <!-- LICZBA PYTAŃ -->
    <div>
      <div class="config-section-title">Liczba pytań</div>
      <div class="count-row">
        <div class="count-control">
          <button class="count-btn" onclick="adjustCount(-1)">−</button>
          <input type="number" class="count-val" id="count-display" value="558" min="1" oninput="onCountInput(this)">
          <button class="count-btn" onclick="adjustCount(+1)">+</button>
        </div>
        <div class="quick-btns" id="quick-btns">
          <button class="quick-btn" data-n="20" onclick="setQuick(this)">20</button>
          <button class="quick-btn" data-n="30" onclick="setQuick(this)">30</button>
          <button class="quick-btn" data-n="50" onclick="setQuick(this)">50</button>
          <button class="quick-btn" data-n="100" onclick="setQuick(this)">100</button>
          <button class="quick-btn active" data-n="all" onclick="setQuick(this)">Wszystkie</button>
        </div>
      </div>
    </div>

    <!-- START -->
    <div class="start-row">
      <button class="btn-start" id="btn-start" onclick="startQuiz()">Rozpocznij test ▶</button>
      <div class="start-hint" id="start-hint">Wybierz co najmniej jeden dział</div>
    </div>

  </div>
</div>

<!-- ══ QUIZ ══ -->
<div id="quiz">
  <div class="qhdr">
    <div class="qhdr-title">⚓ Sternik</div>
    <div class="qhdr-bar"><div class="qhdr-fill" id="qhdr-fill"></div></div>
    <div class="qhdr-info">
      <div class="qhdr-prog" id="qhdr-prog"></div>
      <div class="qhdr-score">
        <span class="ok-c">✓</span> <span class="sv" id="sc-ok">0</span>
        &nbsp;
        <span class="err-c">✗</span> <span class="sv" id="sc-err">0</span>
      </div>
    </div>
  </div>
  <div class="qbody">
    <div class="qnum"  id="qnum"></div>
    <div class="qtext" id="qtext"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">Następne →</button>
  </div>
</div>

<!-- ══ RESULTS ══ -->
<div id="results">
  <div class="res-inner">
    <h2>Wyniki testu</h2>
    <div class="res-sub" id="res-sub"></div>
    <div class="result-ring">
      <svg class="rsvg" viewBox="0 0 150 150" width="150" height="150">
        <circle class="rring-bg"   cx="75" cy="75" r="63"/>
        <circle class="rring-fill" cx="75" cy="75" r="63" id="rring" stroke-dasharray="0 396"/>
      </svg>
      <div class="rtext">
        <div class="rpct" id="rpct">0%</div>
        <div class="rsub">poprawnych</div>
      </div>
    </div>
    <div class="grade-pill" id="grade"></div>
    <div class="stat-row">
      <div class="stat-box"><div class="sv" id="rs-tot">0</div><div class="sl">Pytań</div></div>
      <div class="stat-box sg"><div class="sv" id="rs-ok">0</div><div class="sl">Poprawnych</div></div>
      <div class="stat-box sr"><div class="sv" id="rs-err">0</div><div class="sl">Błędnych</div></div>
    </div>
    <div class="res-btns">
      <button class="btn-redo" onclick="location.reload()">🔄 Nowy test</button>
      <button class="btn-out" id="rev-toggle" onclick="toggleReview()">📋 Pokaż błędy</button>
    </div>
  </div>
  <div class="review-wrap" id="rev-wrap" style="display:none">
    <div class="review-hdr" id="rev-hdr"></div>
    <div id="rev-list"></div>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────

// ─── CONFIG STATE ─────────────────────────────────────────────────────────
let wantCount = ALL_Q.length;
let useAll = true;

function getCheckedRanges() {
  return [...document.querySelectorAll('.sec-cb:checked')].map(cb => ({
    start: +cb.dataset.start, end: +cb.dataset.end
  }));
}

function getAvailablePool() {
  const ranges = getCheckedRanges();
  let pool = [];
  ranges.forEach(r => { for (let i = r.start; i <= r.end; i++) pool.push(ALL_Q[i]); });
  return pool;
}

function updateAvail() {
  const pool = getAvailablePool();
  const avail = pool.length;
  document.getElementById('avail-count').textContent = avail;

  // Clamp count to avail
  if (wantCount > avail || useAll) {
    wantCount = avail;
  }
  document.getElementById('count-display').value = wantCount;

  const btn = document.getElementById('btn-start');
  const hint = document.getElementById('start-hint');
  if (avail === 0) {
    btn.disabled = true;
    hint.textContent = 'Wybierz co najmniej jeden dział';
  } else {
    btn.disabled = false;
    hint.textContent = `${wantCount} z ${avail} dostępnych pytań`;
  }

  highlightQuickBtn();
}

function highlightQuickBtn() {
  const avail = getAvailablePool().length;
  document.querySelectorAll('.quick-btn').forEach(b => {
    b.classList.remove('active');
    if (b.dataset.n === 'all') {
      if (useAll || wantCount === avail) b.classList.add('active');
    } else {
      if (!useAll && +b.dataset.n === wantCount) b.classList.add('active');
    }
  });
}

function selectAllSections(val) {
  document.querySelectorAll('.sec-cb').forEach(cb => cb.checked = val);
  useAll = true;
  updateAvail();
}

document.querySelectorAll('.sec-cb').forEach(cb => cb.addEventListener('change', () => {
  useAll = true;
  updateAvail();
}));

function onCountInput(el) {
  const avail = getAvailablePool().length;
  let v = parseInt(el.value, 10);
  if (isNaN(v) || v < 1) v = 1;
  if (v >= avail) { v = avail; useAll = true; } else { useAll = false; }
  wantCount = v;
  el.value = wantCount;
  highlightQuickBtn();
  updateAvail();
}

function adjustCount(delta) {
  const avail = getAvailablePool().length;
  if (avail === 0) return;
  useAll = false;
  wantCount = Math.max(1, Math.min(avail, wantCount + delta));
  document.getElementById('count-display').value = wantCount;
  updateAvail();
}

function setQuick(el) {
  const avail = getAvailablePool().length;
  if (el.dataset.n === 'all') {
    useAll = true;
    wantCount = avail;
  } else {
    useAll = false;
    wantCount = Math.min(avail, +el.dataset.n);
  }
  document.getElementById('count-display').value = wantCount;
  highlightQuickBtn();
  updateAvail();
}

updateAvail();

// ─── QUIZ STATE ────────────────────────────────────────────────────────────
let questions = [], idx = 0, okCount = 0, errCount = 0, answered = false, log = [];

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function startQuiz() {
  const pool = shuffle(getAvailablePool()).slice(0, wantCount);
  questions = pool.map(q => ({ q, shuffled: shuffle(q.answers) }));
  idx = 0; okCount = 0; errCount = 0; log = [];

  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQ();
}

function renderQ() {
  answered = false;
  const total = questions.length;
  const { q, shuffled } = questions[idx];

  document.getElementById('qhdr-fill').style.width = `${(idx / total) * 100}%`;
  document.getElementById('qhdr-prog').textContent = `${idx + 1} / ${total}`;
  document.getElementById('sc-ok').textContent  = okCount;
  document.getElementById('sc-err').textContent = errCount;
  document.getElementById('qnum').textContent   = `Pytanie ${idx + 1} z ${total}`;
  document.getElementById('qtext').textContent  = q.question;

  const labels = ['A','B','C','D'];
  const cont = document.getElementById('answers');
  cont.innerHTML = '';
  shuffled.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.innerHTML = `<span class="ans-label">${labels[i]}</span><span>${ans.text}</span>`;
    btn.onclick = () => pick(btn, ans, shuffled);
    cont.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  const bn = document.getElementById('btn-next');
  bn.className = 'btn-next';
}

function pick(btn, chosen, shuffled) {
  if (answered) return;
  answered = true;

  const { q } = questions[idx];
  const ok = chosen.correct;

  document.querySelectorAll('.ans-btn').forEach((b, i) => {
    b.classList.add('locked');
    if (shuffled[i].correct) b.classList.add('correct');
  });
  if (!ok) btn.classList.add('wrong');

  if (ok) {
    okCount++;
    showFb(true, '✓ Poprawna odpowiedź!');
  } else {
    errCount++;
    const ct = shuffled.find(a => a.correct).text;
    showFb(false, `✗ Błąd. Poprawna: ${ct}`);
  }
  log.push({ q, chosen, ok, shuffled });

  const bn = document.getElementById('btn-next');
  bn.textContent = idx < questions.length - 1 ? 'Następne →' : 'Zobacz wyniki ✔';
  bn.className = 'btn-next show';
  document.getElementById('sc-ok').textContent  = okCount;
  document.getElementById('sc-err').textContent = errCount;
}

function showFb(ok, msg) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = 'feedback show ' + (ok ? 'ok' : 'err');
}

function nextQ() {
  idx++;
  if (idx < questions.length) { renderQ(); window.scrollTo(0,0); }
  else showResults();
}

// ─── RESULTS ──────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  window.scrollTo(0,0);

  const total = questions.length;
  const pct   = Math.round((okCount / total) * 100);

  document.getElementById('rs-tot').textContent  = total;
  document.getElementById('rs-ok').textContent   = okCount;
  document.getElementById('rs-err').textContent  = errCount;
  document.getElementById('rpct').textContent    = pct + '%';
  document.getElementById('res-sub').textContent = `${okCount} z ${total} poprawnych odpowiedzi`;

  const circ = 2 * Math.PI * 63;
  const color = pct >= 75 ? 'var(--green)' : pct >= 60 ? 'var(--accent)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';
  setTimeout(() => {
    const ring = document.getElementById('rring');
    ring.style.stroke = color;
    ring.setAttribute('stroke-dasharray', `${circ * pct / 100} ${circ}`);
  }, 100);

  const grade = document.getElementById('grade');
  if (pct >= 80)      { grade.textContent = 'Zdałeś/abyś! 🎉'; grade.className = 'grade-pill gA'; }
  else if (pct >= 70) { grade.textContent = 'Dobry wynik 👍';  grade.className = 'grade-pill gB'; }
  else if (pct >= 50) { grade.textContent = 'Jeszcze trochę 📖'; grade.className = 'grade-pill gC'; }
  else                { grade.textContent = 'Potrzebujesz więcej ćwiczeń ❌'; grade.className = 'grade-pill gD'; }

  // Build review
  const list = document.getElementById('rev-list');
  list.innerHTML = '';
  const wrongItems = log.filter(r => !r.ok);
  document.getElementById('rev-hdr').textContent = `Błędne odpowiedzi: ${wrongItems.length}`;
  wrongItems.forEach(r => {
    const ct = r.shuffled.find(a => a.correct).text;
    const d = document.createElement('div');
    d.className = 'rev-item rev-wrong';
    d.innerHTML = `<div class="rev-q">❓ ${r.q.question}</div>
      <div class="rev-ans">
        <span class="wa">✗ Twoja: ${r.chosen.text}</span><br>
        <span class="ca">✓ Poprawna: ${ct}</span>
      </div>`;
    list.appendChild(d);
  });

  document.getElementById('rev-toggle').style.display = wrongItems.length ? '' : 'none';
}

let revVisible = false;
function toggleReview() {
  revVisible = !revVisible;
  document.getElementById('rev-wrap').style.display = revVisible ? 'block' : 'none';
  document.getElementById('rev-toggle').textContent = revVisible ? '📋 Ukryj błędy' : '📋 Pokaż błędy';
}
</script>
