<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test – Sternik Motorowodny</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a2342;
    --ocean: #1a5276;
    --sky: #2e86c1;
    --foam: #d6eaf8;
    --sand: #fdf6e3;
    --coral: #e74c3c;
    --green: #27ae60;
    --yellow: #f39c12;
    --text: #1c2833;
    --muted: #5d6d7e;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(10,35,66,0.12);
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  /* HEADER */
  header {
    width: 100%;
    background: linear-gradient(135deg, var(--navy) 0%, var(--ocean) 100%);
    color: white;
    text-align: center;
    padding: 36px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 40px;
    background: var(--sand);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; letter-spacing: 0.03em; }
  header p { margin-top: 6px; font-size: 0.95rem; opacity: 0.8; }
  .anchor-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }

  /* MAIN WRAPPER */
  .container {
    width: 100%;
    max-width: 820px;
    padding: 0 16px;
    margin-top: 36px;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* SETUP SCREEN */
  .setup-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px;
  }
  .setup-card h2 { font-size: 1.2rem; color: var(--ocean); margin-bottom: 20px; }
  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .section-checkbox {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--foam);
    border: 2px solid transparent;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }
  .section-checkbox:hover { border-color: var(--sky); }
  .section-checkbox input { margin-top: 3px; accent-color: var(--ocean); width: 16px; height: 16px; flex-shrink: 0; }
  .section-checkbox span { font-size: 0.88rem; font-weight: 500; color: var(--text); }
  .section-count { font-size: 0.75rem; color: var(--muted); display: block; margin-top: 2px; }

  .options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
    align-items: flex-end;
  }
  .option-group { display: flex; flex-direction: column; gap: 6px; }
  .option-group label { font-size: 0.85rem; font-weight: 600; color: var(--muted); }
  .option-group select, .option-group input[type=number] {
    border: 2px solid #dde; border-radius: 8px;
    padding: 8px 12px; font-size: 0.95rem; color: var(--text);
    background: white; outline: none;
    transition: border-color 0.2s;
  }
  .option-group select:focus, .option-group input:focus { border-color: var(--sky); }
  input[type=number] { width: 100px; }

  .btn-start {
    display: block; width: 100%;
    background: linear-gradient(135deg, var(--ocean), var(--sky));
    color: white; border: none; border-radius: 10px;
    padding: 16px; font-size: 1.05rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .btn-start:hover { opacity: 0.92; }
  .btn-start:active { transform: scale(0.99); }

  /* QUIZ SCREEN */
  .quiz-header {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 24px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .quiz-meta { font-size: 0.88rem; color: var(--muted); }
  .quiz-meta strong { color: var(--text); }
  .quiz-progress { display: flex; align-items: center; gap: 10px; }
  .progress-bar {
    width: 160px; height: 8px;
    background: #eee; border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--ocean), var(--sky));
    border-radius: 99px; transition: width 0.3s;
  }
  .score-badge {
    background: var(--foam); border-radius: 99px;
    padding: 4px 14px; font-size: 0.82rem; font-weight: 600; color: var(--ocean);
  }

  .question-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 28px 24px;
    margin-bottom: 18px;
  }
  .question-section {
    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--sky);
    margin-bottom: 10px;
  }
  .question-text {
    font-size: 1.05rem; font-weight: 600; line-height: 1.5;
    color: var(--navy); margin-bottom: 20px;
  }
  .question-num { color: var(--muted); font-weight: 400; margin-right: 6px; }

  .answers { display: flex; flex-direction: column; gap: 10px; }
  .answer-btn {
    display: flex; align-items: center; gap: 14px;
    background: #f7f9fb; border: 2px solid #e0e8f0;
    border-radius: 8px; padding: 13px 16px;
    cursor: pointer; text-align: left;
    font-size: 0.95rem; color: var(--text); font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .answer-btn:not(.disabled):hover { border-color: var(--sky); background: var(--foam); }
  .answer-btn .letter {
    width: 28px; height: 28px; border-radius: 50%;
    background: white; border: 2px solid #c5d5e0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; flex-shrink: 0;
    color: var(--muted); transition: all 0.15s;
  }
  .answer-btn.correct { border-color: var(--green); background: #eafaf1; }
  .answer-btn.correct .letter { background: var(--green); border-color: var(--green); color: white; }
  .answer-btn.wrong { border-color: var(--coral); background: #fdedec; }
  .answer-btn.wrong .letter { background: var(--coral); border-color: var(--coral); color: white; }
  .answer-btn.disabled { cursor: default; }

  .feedback-bar {
    margin-top: 16px; padding: 12px 16px;
    border-radius: 8px; font-size: 0.9rem; font-weight: 600;
    display: none;
  }
  .feedback-bar.correct { background: #eafaf1; color: #1d8348; border: 1.5px solid #a9dfbf; }
  .feedback-bar.wrong { background: #fdedec; color: #922b21; border: 1.5px solid #f5b7b1; }

  .quiz-actions {
    display: flex; justify-content: flex-end;
    gap: 10px;
  }
  .btn-next, .btn-quit {
    border: none; border-radius: 8px;
    padding: 12px 26px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--ocean), var(--sky));
    color: white;
  }
  .btn-quit {
    background: #ecf0f1; color: var(--muted);
  }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RESULTS SCREEN */
  .results-card {
    background: white; border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 36px 32px;
    text-align: center;
  }
  .result-emoji { font-size: 3.5rem; margin-bottom: 16px; }
  .results-card h2 { font-size: 1.5rem; color: var(--navy); margin-bottom: 8px; }
  .result-score-big {
    font-size: 3rem; font-weight: 800; margin: 16px 0;
    color: var(--ocean);
  }
  .result-breakdown {
    display: flex; justify-content: center; gap: 24px;
    margin: 20px 0 28px; flex-wrap: wrap;
  }
  .rb-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .rb-val { font-size: 1.5rem; font-weight: 700; }
  .rb-lbl { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .rb-correct { color: var(--green); }
  .rb-wrong { color: var(--coral); }

  .section-results {
    margin: 20px 0; text-align: left;
  }
  .section-result-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid #eee;
  }
  .sr-name { flex: 1; font-size: 0.9rem; }
  .sr-bar-wrap { width: 120px; height: 8px; background: #eee; border-radius: 99px; overflow: hidden; }
  .sr-bar { height: 100%; border-radius: 99px; }
  .sr-pct { font-size: 0.85rem; font-weight: 700; min-width: 38px; text-align: right; }

  .wrong-review {
    margin-top: 28px; text-align: left;
  }
  .wrong-review h3 { font-size: 1rem; color: var(--navy); margin-bottom: 14px; }
  .review-item {
    background: #fff8f8; border: 1.5px solid #fadbd8;
    border-radius: 8px; padding: 14px; margin-bottom: 10px;
  }
  .review-q { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .review-your { font-size: 0.85rem; color: var(--coral); margin-bottom: 4px; }
  .review-correct { font-size: 0.85rem; color: var(--green); }

  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }
  .btn-retry { 
    background: linear-gradient(135deg, var(--ocean), var(--sky));
    color: white; border: none; border-radius: 8px;
    padding: 13px 30px; font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  .btn-back {
    background: #ecf0f1; color: var(--muted);
    border: none; border-radius: 8px;
    padding: 13px 30px; font-size: 1rem; font-weight: 700; cursor: pointer;
  }

  @media (max-width: 500px) {
    .setup-card, .question-card, .results-card { padding: 18px; }
    .quiz-header { flex-direction: column; align-items: flex-start; }
    .progress-bar { width: 120px; }
  }
</style>
</head>
<body>

<header>
  <span class="anchor-icon">⚓</span>
  <h1>Sternik Motorowodny</h1>
  <p>Baza pytań egzaminacyjnych – 558 pytań</p>
</header>

<div class="container">

  <!-- SETUP SCREEN -->
  <div class="screen active" id="screen-setup">
    <div class="setup-card">
      <h2>🎯 Skonfiguruj test</h2>
      <div class="section-grid" id="section-grid"></div>

      <div class="options-row">
        <div class="option-group">
          <label>Liczba pytań</label>
          <input type="number" id="num-questions" value="20" min="5" max="558">
        </div>
        <div class="option-group">
          <label>Kolejność</label>
          <select id="order">
            <option value="random">Losowa</option>
            <option value="sequential">Po kolei</option>
          </select>
        </div>
        <div class="option-group">
          <label>Tryb</label>
          <select id="mode">
            <option value="feedback">Z natychmiastową informacją</option>
            <option value="exam">Egzaminacyjny (wyniki na końcu)</option>
          </select>
        </div>
      </div>

      <button class="btn-start" onclick="startQuiz()">🚀 Rozpocznij test</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <div class="quiz-meta">
        Pytanie <strong id="q-num">1</strong> z <strong id="q-total">20</strong>
      </div>
      <div class="quiz-progress">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="score-badge" id="score-badge">0 / 0</span>
      </div>
      <button class="btn-quit" onclick="confirmQuit()">✕ Zakończ</button>
    </div>

    <div class="question-card">
      <div class="question-section" id="q-section"></div>
      <div class="question-text" id="q-text"></div>
      <div class="answers" id="answers"></div>
      <div class="feedback-bar" id="feedback-bar"></div>
    </div>

    <div class="quiz-actions">
      <button class="btn-next" id="btn-next" disabled onclick="nextQuestion()">Następne →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="screen" id="screen-results">
    <div class="results-card">
      <div class="result-emoji" id="result-emoji"></div>
      <h2 id="result-headline"></h2>
      <div class="result-score-big" id="result-score-big"></div>
      <div class="result-breakdown">
        <div class="rb-item">
          <span class="rb-val rb-correct" id="rb-correct"></span>
          <span class="rb-lbl">Poprawne</span>
        </div>
        <div class="rb-item">
          <span class="rb-val rb-wrong" id="rb-wrong"></span>
          <span class="rb-lbl">Błędne</span>
        </div>
        <div class="rb-item">
          <span class="rb-val" id="rb-total" style="color:var(--ocean)"></span>
          <span class="rb-lbl">Łącznie</span>
        </div>
      </div>

      <div class="section-results" id="section-results"></div>
      <div class="wrong-review" id="wrong-review"></div>

      <div class="result-btns">
        <button class="btn-back" onclick="goSetup()">← Nowy test</button>
        <button class="btn-retry" onclick="retryQuiz()">🔄 Powtórz błędne</button>
      </div>
    </div>
  </div>

</div>

<script>
const DATA = {"Przepisy śródlądowe i morskie":[{"q":"Jakie przepisy regulują ruch na śródlądowych drogach wodnych?","a":["Rozporządzenie Ministra Sportu i Turystyki z 2019 roku","Ustawa o żegludze śródlądowej z dnia 21 grudnia 2000 r.","Międzynarodowe prawo drogi (COLREGS)"],"c":1},{"q":"Do jakiej długości statek zaliczany jest do małych jednostek?","a":["Do 7,5 m","Do 12 m","Do 20 m"],"c":2},{"q":"Kto jest odpowiedzialny za przestrzeganie przepisów żeglugowych na statku?","a":["Armator jednostki","Kierownik statku (sternik)","Najstarszy członek załogi"],"c":1},{"q":"Kiedy statek nie jest uważany za będący w ruchu?","a":["Gdy stoi na kotwicy, jest przycumowany do brzegu lub osiadł na mieliźnie","Gdy płynie z małą prędkością","Gdy płynie tylko na wiosłach"],"c":0},{"q":"Jak należy zachować się po zderzeniu jednostek?","a":["Odpłynąć na bezpieczną odległość i kontynuować rejs","Udzielić pomocy, zanotować dane i powiadomić Policję Wodną","Oczekiwać na miejscu bez żadnych działań"],"c":1},{"q":"Kiedy można odstąpić od przepisów żeglugowych?","a":["Nigdy","Gdy grozi bezpośrednie niebezpieczeństwo","Gdy sternik uzna, że przepisy są nieaktualne"],"c":1},{"q":"Kto sprawuje nadzór nad przestrzeganiem przepisów żeglugowych?","a":["Straż Pożarna","Policja Wodna i administracja dróg wodnych","Kapitanat portu morskiego"],"c":1},{"q":"Jakie są podstawowe reguły zachowania się na śródlądowych drogach wodnych?","a":["Pływać z maksymalną prędkością","Przestrzegać zasad bezpiecznego prowadzenia statku i unikać zderzeń","Ustępować wszystkim jednostkom żaglowym"],"c":1},{"q":"Co oznacza określenie „statek o napędzie mechanicznym”?","a":["Każdy statek z żaglami","Każdy statek wprowadzany w ruch przez maszynę","Tylko statek z silnikiem stacjonarnym"],"c":1},{"q":"Co oznacza określenie „statek żaglowy”?","a":["Statek poruszający się wyłącznie za pomocą żagli","Statek płynący na żaglach i silniku","Statek poruszający się wiatrem i prądem"],"c":0},{"q":"Kiedy statek żaglowy uważa się za sta const SECTION_COLORS = ['#2e86c1','#27ae60','#e67e22','#8e44ad','#16a085'];
const LETTERS = ['A','B','C','D'];

let quiz = { questions:[], idx:0, correct:0, wrong:[], mode:'feedback', answered:false };
let sectionStats = {};

// Build section checkboxes
const grid = document.getElementById('section-grid');
Object.entries(DATA).forEach(([name, qs], i) => {
  const label = document.createElement('label');
  label.className = 'section-checkbox';
  label.innerHTML = `<input type="checkbox" name="section" value="${name}" checked>
    <span>${name}<span class="section-count">${qs.length} pytań</span></span>`;
  grid.appendChild(label);
});

function startQuiz() {
  const checked = [...document.querySelectorAll('input[name=section]:checked')].map(el=>el.value);
  if (!checked.length) { alert('Wybierz co najmniej jeden dział.'); return; }
  
  let pool = [];
  checked.forEach(name => {
    DATA[name].forEach(q => pool.push({...q, section: name}));
  });

  const order = document.getElementById('order').value;
  if (order === 'random') pool = pool.sort(()=>Math.random()-0.5);

  const n = Math.min(parseInt(document.getElementById('num-questions').value) || 20, pool.length);
  quiz.questions = pool.slice(0, n);
  quiz.idx = 0; quiz.correct = 0; quiz.wrong = [];
  quiz.mode = document.getElementById('mode').value;
  quiz.answered = false;

  sectionStats = {};
  checked.forEach(s => sectionStats[s] = {total:0, correct:0});

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = quiz.questions[quiz.idx];
  const total = quiz.questions.length;
  quiz.answered = false;

  document.getElementById('q-num').textContent = quiz.idx+1;
  document.getElementById('q-total').textContent = total;
  document.getElementById('progress-fill').style.width = ((quiz.idx/total)*100)+'%';
  document.getElementById('score-badge').textContent = quiz.correct+' / '+quiz.idx;
  document.getElementById('q-section').textContent = q.section;
  document.getElementById('q-text').innerHTML = '<span class="question-num">'+(quiz.idx+1)+'.</span>'+escHtml(q.q);

  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  const feedback = document.getElementById('feedback-bar');
  feedback.style.display = 'none';
  feedback.className = 'feedback-bar';
  document.getElementById('btn-next').disabled = true;

  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="letter">${LETTERS[i]}</span><span>${escHtml(ans)}</span>`;
    btn.onclick = () => selectAnswer(i, q.c);
    answersEl.appendChild(btn);
  });
}

function selectAnswer(chosen, correct) {
  if (quiz.answered) return;
  quiz.answered = true;
  const q = quiz.questions[quiz.idx];

  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.onclick = null;
    if (i === correct) btn.classList.add('correct');
    else if (i === chosen && chosen !== correct) btn.classList.add('wrong');
  });

  const isCorrect = chosen === correct;
  if (isCorrect) {
    quiz.correct++;
    if (sectionStats[q.section]) sectionStats[q.section].correct++;
  } else {
    quiz.wrong.push({q: q.q, yourIdx: chosen, correctIdx: correct, options: q.a, section: q.section});
  }
  if (sectionStats[q.section]) sectionStats[q.section].total++;

  document.getElementById('score-badge').textContent = quiz.correct+' / '+(quiz.idx+1);

  if (quiz.mode === 'feedback') {
    const fb = document.getElementById('feedback-bar');
    fb.style.display = 'block';
    if (isCorrect) {
      fb.className = 'feedback-bar correct';
      fb.textContent = '✓ Poprawnie!';
    } else {
      fb.className = 'feedback-bar wrong';
      fb.textContent = '✗ Błąd. Prawidłowa odpowiedź: '+LETTERS[correct]+'. '+q.a[correct];
    }
  }

  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if (!quiz.answered) return;
  quiz.idx++;
  if (quiz.idx >= quiz.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  showScreen('results');
  const total = quiz.questions.length;
  const pct = Math.round((quiz.correct/total)*100);
  
  document.getElementById('result-score-big').textContent = pct+'%';
  document.getElementById('rb-correct').textContent = quiz.correct;
  document.getElementById('rb-wrong').textContent = quiz.wrong.length;
  document.getElementById('rb-total').textContent = total;

  let emoji = '😐'; let headline = 'Nieźle!';
  if (pct >= 90) { emoji = '🏆'; headline = 'Znakomity wynik!'; }
  else if (pct >= 75) { emoji = '👍'; headline = 'Dobry wynik!'; }
  else if (pct >= 60) { emoji = '📖'; headline = 'Warto jeszcze powtórzyć.'; }
  else { emoji = '⚓'; headline = 'Jeszcze trochę nauki przed Tobą.'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-headline').textContent = headline;

  // Section breakdown
  const srEl = document.getElementById('section-results');
  srEl.innerHTML = '';
  let hasStats = Object.values(sectionStats).some(s=>s.total>0);
  if (hasStats) {
    const h = document.createElement('h3');
    h.style.cssText = 'font-size:.95rem;color:var(--navy);margin-bottom:10px;';
    h.textContent = 'Wyniki wg działów';
    srEl.appendChild(h);
    Object.entries(sectionStats).filter(([,s])=>s.total>0).forEach(([name,s], i) => {
      const p = s.total ? Math.round((s.correct/s.total)*100) : 0;
      const color = p>=75 ? 'var(--green)' : p>=50 ? 'var(--yellow)' : 'var(--coral)';
      const row = document.createElement('div');
      row.className = 'section-result-row';
      row.innerHTML = `<span class="sr-name">${name}</span>
        <div class="sr-bar-wrap"><div class="sr-bar" style="width:${p}%;background:${color}"></div></div>
        <span class="sr-pct" style="color:${color}">${p}%</span>
        <span style="font-size:.78rem;color:var(--muted)">${s.correct}/${s.total}</span>`;
      srEl.appendChild(row);
    });
  }

  // Wrong answers review
  const wrEl = document.getElementById('wrong-review');
  wrEl.innerHTML = '';
  if (quiz.wrong.length > 0) {
    const h = document.createElement('h3');
    h.textContent = '❌ Błędne odpowiedzi ('+quiz.wrong.length+')';
    wrEl.appendChild(h);
    quiz.wrong.forEach(item => {
      const div = document.createElement('div');
      div.className = 'review-item';
      div.innerHTML = `<div class="review-q">${escHtml(item.q)}</div>
        <div class="review-your">Twoja: ${LETTERS[item.yourIdx]}. ${escHtml(item.options[item.yourIdx])}</div>
        <div class="review-correct">✓ Prawidłowa: ${LETTERS[item.correctIdx]}. ${escHtml(item.options[item.correctIdx])}</div>`;
      wrEl.appendChild(div);
    });
  }

  // Update retry button
  document.querySelector('.btn-retry').style.display = quiz.wrong.length ? 'block' : 'none';
}

function retryQuiz() {
  if (!quiz.wrong.length) return;
  const wrongQs = quiz.wrong.map(w => ({
    q: w.q, a: w.options, c: w.correctIdx,
    section: w.section
  }));
  quiz.questions = wrongQs.sort(()=>Math.random()-0.5);
  quiz.idx = 0; quiz.correct = 0; quiz.wrong = [];
  sectionStats = {};
  wrongQs.forEach(q => { if (!sectionStats[q.section]) sectionStats[q.section]={total:0,correct:0}; });
  showScreen('quiz');
  renderQuestion();
}

function goSetup() { showScreen('setup'); }

function confirmQuit() {
  if (confirm('Zakończyć test i zobaczyć wyniki?')) showResults();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
